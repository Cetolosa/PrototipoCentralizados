<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Gráfico de Barras (SVG, sin dependencias)</title>
<style>
  :root{
    --font: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Noto Sans", sans-serif;
    --bg: #ffffff;
    --fg: #111827;
    --muted: #6b7280;
    --grid: #e5e7eb;
    --bar: #2563eb;
    --bar-hover: #1d4ed8;
    --accent: #111827;
  }
  html, body { margin:0; background:var(--bg); color:var(--fg); font-family:var(--font); }
  .wrap { max-width: 920px; margin: 24px auto; padding: 0 16px; }
  h1 { font-size: clamp(1.1rem, 1.2rem + 0.5vw, 1.6rem); margin: 0 0 12px; }
  .subtitle { color: var(--muted); margin-bottom: 16px; }

  .chart-card{
    border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px;
    box-shadow: 0 1px 2px rgba(0,0,0,.04);
    background: var(--bg);
  }
  .chart-head{
    display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:10px;
  }
  .chart-title{ font-weight:600; }
  .chart-legend{
    display:flex; gap:12px; flex-wrap:wrap; font-size: 13px; color: var(--muted);
  }
  .legend-item{ display:inline-flex; align-items:center; gap:6px; }
  .legend-swatch{
    width:10px; height:10px; border-radius:2px; background: var(--bar); outline:1px solid #d1d5db;
  }

  /* SVG responsive container */
  .svg-wrap{ width:100%; aspect-ratio: 16 / 9; }
  svg { width:100%; height:100%; display:block; }

  /* Tooltip simple */
  .tooltip{
    position: fixed; pointer-events:none; background:#111827; color:#fff;
    font-size:12px; padding:6px 8px; border-radius:6px; opacity:0; transform:translate(-50%, -140%);
    transition: opacity .12s ease-out;
    white-space: nowrap; z-index: 1000;
  }

  /* Ejes y grilla */
  .axis text{ fill: var(--muted); font-size: 12px; }
  .grid line{ stroke: var(--grid); stroke-width:1; }
  .bar{ fill: var(--bar); rx:4; ry:4; transition: y .15s, height .15s, fill .12s; }
  .bar:hover{ fill: var(--bar-hover); }
  .x-label{ fill: var(--muted); font-size: 12px; transform: translateY(16px); }
</style>
</head>
<body>
<div class="wrap">
  <h1>Gráfico de Barras (SVG)</h1>
  <p class="subtitle">Copiar/pegar en cualquier HTML. Actualiza el array <code>data</code> para cambiar valores y etiquetas.</p>

  <div class="chart-card" role="group" aria-labelledby="title1" aria-describedby="desc1">
    <div class="chart-head">
      <div id="title1" class="chart-title">Ventas mensuales</div>
      <div class="chart-legend" aria-hidden="true">
        <span class="legend-item"><span class="legend-swatch"></span> Ventas</span>
      </div>
    </div>

    <div id="desc1" class="visually-hidden" aria-hidden="true">Gráfico de barras comparando valores por categoría. Pase el cursor para ver detalles.</div>

    <div class="svg-wrap">
      <svg viewBox="0 0 900 520" role="img" aria-labelledby="title1 desc1">
        <!-- Márgenes para ejes -->
        <g id="chartRoot" transform="translate(70,20)">
          <!-- Grilla horizontal -->
          <g class="grid" id="yGrid"></g>
          <!-- Eje Y (labels) -->
          <g class="axis" id="yAxis"></g>
          <!-- Barras -->
          <g id="bars"></g>
          <!-- Eje X (categorías) -->
          <g id="xAxis" transform="translate(0,420)"></g>
        </g>
      </svg>
    </div>
  </div>
</div>

<div id="tooltip" class="tooltip" role="status" aria-live="polite"></div>

<script>
/* ====== Configurable data ====== */
const data = [
  { label: "Ene", value: 18 },
  { label: "Feb", value: 26 },
  { label: "Mar", value: 21 },
  { label: "Abr", value: 32 },
  { label: "May", value: 28 },
  { label: "Jun", value: 36 },
  { label: "Jul", value: 42 },
  { label: "Ago", value: 39 },
  { label: "Sep", value: 31 },
  { label: "Oct", value: 27 },
  { label: "Nov", value: 33 },
  { label: "Dic", value: 45 }
];

const yTicks = 5;           // Número de líneas de grilla
const topPad = 10, rightPad = 10, bottomPad = 0, leftPad = 0;
const innerW = 900 - 70 - rightPad;  // viewBox width - left margin - rightPad
const innerH = 520 - 20 - 80;        // viewBox height - top margin - (bottom margin + ejes)
const barGap = 10;         // Separación entre barras
const tooltip = document.getElementById('tooltip');

function fmt(val){ return new Intl.NumberFormat('es-CL').format(val); }

// Escalas simples (sin librerías)
const maxVal = Math.max(0, ...data.map(d => d.value));
const niceMax = calcNiceMax(maxVal);
const scaleY = v => innerH - (v / niceMax) * innerH;

function calcNiceMax(x){
  if (x <= 0) return 1;
  const pow10 = Math.pow(10, Math.floor(Math.log10(x)));
  const m = x / pow10;
  let nice;
  if (m <= 1) nice = 1;
  else if (m <= 2) nice = 2;
  else if (m <= 5) nice = 5;
  else nice = 10;
  return nice * pow10;
}

function renderYGrid(){
  const grid = document.getElementById('yGrid');
  grid.innerHTML = '';
  for (let i = 0; i <= yTicks; i++){
    const v = (niceMax / yTicks) * i;
    const y = scaleY(v);
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', 0);
    line.setAttribute('x2', innerW - leftPad - rightPad);
    line.setAttribute('y1', y);
    line.setAttribute('y2', y);
    grid.appendChild(line);
  }
}

function renderYAxis(){
  const axis = document.getElementById('yAxis');
  axis.innerHTML = '';
  for (let i = 0; i <= yTicks; i++){
    const v = (niceMax / yTicks) * i;
    const y = scaleY(v);
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x', -12);
    txt.setAttribute('y', y + 4);
    txt.setAttribute('text-anchor', 'end');
    txt.textContent = fmt(v);
    axis.appendChild(txt);
  }
}

function renderXAxis(){
  const axis = document.getElementById('xAxis');
  axis.innerHTML = '';
  const N = data.length;
  const band = (innerW - leftPad - rightPad) / N;

  data.forEach((d, i) => {
    const x = i * band + band / 2;
    const label = document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('x', x);
    label.setAttribute('y', 24);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('class','x-label');
    label.textContent = d.label;
    axis.appendChild(label);
  });
}

function renderBars(){
  const bars = document.getElementById('bars');
  bars.innerHTML = '';
  const N = data.length;
  const band = (innerW - leftPad - rightPad) / N;
  const barW = Math.max(8, band - barGap);

  data.forEach((d, i) => {
    const h = innerH - scaleY(d.value);
    const x = i * band + (band - barW)/2;
    const y = scaleY(d.value);

    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', x);
    rect.setAttribute('y', y);
    rect.setAttribute('width', barW);
    rect.setAttribute('height', h);
    rect.setAttribute('class','bar');
    rect.setAttribute('role','img');
    rect.setAttribute('aria-label', `${d.label}: ${fmt(d.value)}`);

    rect.addEventListener('pointerenter', e => showTip(e, d));
    rect.addEventListener('pointermove', e => moveTip(e));
    rect.addEventListener('pointerleave', hideTip);

    bars.appendChild(rect);

    // Valor encima de la barra (opcional)
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x', x + barW/2);
    txt.setAttribute('y', y - 6);
    txt.setAttribute('text-anchor', 'middle');
    txt.setAttribute('fill', 'var(--accent)');
    txt.setAttribute('font-size', '12');
    txt.textContent = fmt(d.value);
    bars.appendChild(txt);
  });
}

function showTip(e, d){
  tooltip.textContent = `${d.label}: ${fmt(d.value)}`;
  tooltip.style.opacity = '1';
  moveTip(e);
}
function moveTip(e){
  tooltip.style.left = e.clientX + 'px';
  tooltip.style.top  = e.clientY + 'px';
}
function hideTip(){
  tooltip.style.opacity = '0';
}

function render(){
  renderYGrid();
  renderYAxis();
  renderXAxis();
  renderBars();
}
render();

// Accesibilidad: ocultar visualmente elementos sin quitar del árbol
(function addVisuallyHiddenCSS(){
  const s = document.createElement('style');
  s.textContent = `.visually-hidden{position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}`;
  document.head.appendChild(s);
})();
</script>
</body>
</html>
