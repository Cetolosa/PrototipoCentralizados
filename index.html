<!-- Archivo: index.html (Página de Login, inicial) -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Operativo Aramark - Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #333;
            font-size: 14px;
        }
        #login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f8f9fa;
        }
        .login-form {
            background-color: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }
        .login-form img {
            height: 60px;
            margin-bottom: 20px;
        }
        .login-form input, .login-form select {
            width: 100%;
            margin-bottom: 15px;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .login-form button {
            width: 100%;
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .login-form button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div id="login-screen" style="display: flex;">
        <div class="login-form">
            <img src="https://logos-world.net/wp-content/uploads/2024/07/Aramark-Logo.jpg" alt="Logo Aramark">
            <h2>Autenticación Contratos Centralizados Aramark</h2>
            <input type="text" id="username" placeholder="Usuario">
            <input type="password" id="password" placeholder="Contraseña">
            <select id="profile">
                <option value="admin">Admin</option>
                <option value="operador">Operador</option>
                <option value="reporter">Reporter</option>
            </select>
            <button onclick="login()">Iniciar Sesión</button>
        </div>
    </div>

    <script>
        let currentProfile = '';

        function login() {
            const user = document.getElementById('username').value;
            const profile = document.getElementById('profile').value;
            if (user && profile) {
                localStorage.setItem('user', user);
                localStorage.setItem('profile', profile);
                window.location.href = 'landing.html';
            } else {
                alert('Complete los campos por favor.');
            }
        }
    </script>
</body>
</html>
